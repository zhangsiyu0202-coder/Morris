# MerismV2 local dev stack: Appwrite (self-hosted core) + LiveKit.
# Trimmed from the official Appwrite docker-compose to the services needed for
# Auth / Database / Storage / Functions. Pinned image versions for reproducibility.
# Values default to dev-safe placeholders; override secrets via ../../.env.
name: merism

services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    volumes:
      - appwrite_mariadb:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${_APP_DB_ROOT_PASS:-rootsecret}
      MYSQL_DATABASE: ${_APP_DB_SCHEMA:-appwrite}
      MYSQL_USER: ${_APP_DB_USER:-appwrite}
      MYSQL_PASSWORD: ${_APP_DB_PASS:-appwrite}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - appwrite_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  appwrite:
    image: appwrite/appwrite:1.6.0
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mariadb
      - redis
    volumes:
      - appwrite_uploads:/storage/uploads
      - appwrite_config:/storage/config
      - appwrite_functions:/storage/functions
    environment: &appwrite-env
      _APP_ENV: ${_APP_ENV:-development}
      _APP_LOCALE: ${_APP_LOCALE:-en}
      _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:-dev-secret-key-change-me}
      _APP_DOMAIN: ${_APP_DOMAIN:-localhost:8080}
      _APP_DOMAIN_TARGET: ${_APP_DOMAIN_TARGET:-localhost:8080}
      _APP_REDIS_HOST: redis
      _APP_REDIS_PORT: 6379
      _APP_DB_HOST: mariadb
      _APP_DB_PORT: 3306
      _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:-appwrite}
      _APP_DB_USER: ${_APP_DB_USER:-appwrite}
      _APP_DB_PASS: ${_APP_DB_PASS:-appwrite}
      _APP_EXECUTOR_SECRET: ${_APP_EXECUTOR_SECRET:-dev-executor-secret}
      _APP_EXECUTOR_HOST: http://appwrite-executor/v1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/v1/health/version"]
      interval: 10s
      timeout: 5s
      retries: 30

  appwrite-realtime:
    image: appwrite/appwrite:1.6.0
    entrypoint: realtime
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on: [mariadb, redis]
    environment: *appwrite-env

  appwrite-worker-databases:
    image: appwrite/appwrite:1.6.0
    entrypoint: worker-databases
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: *appwrite-env

  appwrite-worker-builds:
    image: appwrite/appwrite:1.6.0
    entrypoint: worker-builds
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: *appwrite-env

  appwrite-worker-functions:
    image: appwrite/appwrite:1.6.0
    entrypoint: worker-functions
    restart: unless-stopped
    depends_on: [mariadb, redis]
    environment: *appwrite-env

  appwrite-executor:
    image: appwrite/appwrite:1.6.0
    entrypoint: executor
    restart: unless-stopped
    volumes:
      - appwrite_functions:/storage/functions
      - appwrite_builds:/storage/builds
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [appwrite, redis]
    environment:
      <<: *appwrite-env
      _APP_EXECUTOR_RUNTIMES: ${_APP_EXECUTOR_RUNTIMES:-node-20.0}

  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret-change-me-min-32-chars-long}"
    volumes:
      - livekit_data:/data

volumes:
  appwrite_mariadb:
  appwrite_redis:
  appwrite_uploads:
  appwrite_config:
  appwrite_functions:
  appwrite_builds:
  livekit_data:
