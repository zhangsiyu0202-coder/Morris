# Local dev egress config (mounted into livekit-egress). Keep api_key/api_secret in
# sync with LIVEKIT_API_KEY / LIVEKIT_API_SECRET in repo .env (defaults below).
log_level: info
api_key: devkey
api_secret: devsecret-change-me-min-32-chars-long
ws_url: ws://livekit:7880
insecure: true
redis:
  address: redis:6379
